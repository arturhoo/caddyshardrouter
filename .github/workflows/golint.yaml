name: golangci-lint
permissions:
  contents: read
on: pull_request

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check Go version consistency
        run: |
          WORK_VERSION=$(grep '^go ' go.work | awk '{print $2}')
          for f in $(find . -name go.mod); do
            MOD_VERSION=$(grep '^go ' "$f" | awk '{print $2}')
            if [ "$MOD_VERSION" != "$WORK_VERSION" ]; then
              echo "ERROR: $f has go $MOD_VERSION, expected $WORK_VERSION (from go.work)"
              echo "Fix: go mod edit -go=$WORK_VERSION $f"
              exit 1
            fi
          done

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
          args: --timeout=5m
