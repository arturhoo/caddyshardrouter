---
version: "3.9"
services:
  caddy:
    depends_on:
      - redis
      - us-east-1
      - europe-west-2
    build:
      context: .
      args:
        GO_VERSION: ${GO_VERSION}
    environment:
      - REDIS_ADDR=redis:6379
      - GOCOVERDIR=/codecov
    ports:
      - "4567:4567"
    volumes:
      - ./codecov:/codecov
  us-east-1:
    build:
      context: upstream/
      args:
        GO_VERSION: ${GO_VERSION}
    environment:
      - PORT=8080
      - SHARD=us-east-1
  europe-west-2:
    build:
      context: upstream/
      args:
        GO_VERSION: ${GO_VERSION}
    environment:
      - PORT=8080
      - SHARD=europe-west-2
  redis:
    image: &redisVersion "redis:7.2.2"
  define-shards:
    depends_on:
      - redis
    image: *redisVersion
    command: >
      bash -c "
        redis-cli -h redis SET walmart 'us-east-1:8080' &&
        redis-cli -h redis SET waitrose 'europe-west-2:8080'
      "
